<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gerando seu Currículo | Office Express</title>
  <link rel="icon" href="/imagens/icon.png">
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9124893727059633" crossorigin="anonymous"></script>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    :root {
      --bg-1: #001f33;
      --bg-2: #00324a;
    }
    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      background: linear-gradient(135deg, var(--bg-1), var(--bg-2));
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', -apple-system, sans-serif;
      color: white;
      overflow: hidden;
    }
    .loader {
      text-align: center;
      animation: fadeIn 0.5s ease-out;
    }
    .spinner {
      width: 60px;
      height: 60px;
      border: 4px solid rgba(255,255,255,0.2);
      border-top: 4px solid #ff8800;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 24px;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    h2 { font-size: 1.8rem; font-weight: 700; margin-bottom: 12px; }
    p { font-size: 1.1rem; opacity: 0.9; margin-bottom: 8px; }
    .tempo { 
      background: rgba(255,136,0,0.2);
      border: 1px solid rgba(255,136,0,0.4);
      border-radius: 20px;
      padding: 8px 20px;
      font-weight: 600;
      font-size: 1rem;
    }
    header { 
      position: fixed; 
      top: 0; left: 0; right: 0; 
      background: rgba(0,31,51,0.95); 
      padding: 12px 20px; 
      z-index: 100; 
    }
    .logo { height: 32px; }
    @media (max-width: 480px) {
      h2 { font-size: 1.5rem; }
      p { font-size: 1rem; }
    }
  </style>
</head>
<body onload="enviarLog('Loading')">
  
  <!-- Header -->
  <header>
    <img src="https://i.imgur.com/HjzGCoA.png" alt="Office Express" class="logo">
  </header>

  <!-- Loader -->
  <div class="loader">
    <div class="spinner"></div>
    <h2>Gerando seu PDF</h2>
    <p>Processando com segurança...</p>
    <div class="tempo" id="contador">5s</div>
  </div>

  <script src="script.js"></script>
  <script>
    // Auto-redirect após 5 segundos
    let tempo = 5;
    const contador = document.getElementById('contador');
    
    const intervalo = setInterval(() => {
      tempo--;
      if (contador) contador.textContent = tempo + 's';
      if (tempo <= 0) {
        clearInterval(intervalo);
        window.location.href = '/pagamento';
      }
    }, 1000);

    // Abandonou Loading
    let loadingIniciado = true;
    window.addEventListener('beforeunload', function() {
      if (loadingIniciado) {
        enviarLog('Abandonou Loading');
      }
    });

    // Cancelar abandono em navegação interna
    document.addEventListener('click', (e) => {
      const link = e.target.closest('a[href]');
      if (link?.href && link.href.includes(window.location.origin)) {
        loadingIniciado = false;
      }
    });
  </script>
</body>
</html>
