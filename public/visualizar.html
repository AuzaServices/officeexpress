<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9124893727059633" crossorigin="anonymous"></script>
    <title>Visualização do Currículo</title>
    <link rel="icon" href="/imagens/icon.png" type="image/png" />
    <style>
      :root {
        --bg-1: #001f33;
        --bg-2: #00324a;
        --text-primary: #ffffff;
        --border: rgba(255,255,255,0.22);
        --brand: #ff8800;
        --brand-dark: #e67300;
      }

      * { margin: 0; padding: 0; box-sizing: border-box; }

      body {
        font-family: "Segoe UI", sans-serif;
        background-color: #E6F0FA;
        background-image: url("https://www.transparenttextures.com/patterns/diamond-upholstery.png"), linear-gradient(135deg, rgba(0, 0, 0, 0.94), rgba(0, 0, 0, 0.94));
        background-repeat: repeat;
        background-size: auto, cover;
        background-attachment: fixed;
        background-blend-mode: overlay;
        min-height: 100vh;
        overflow-x: hidden;
      }

      header.cabecalho {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 2000;
        background: linear-gradient(to right, var(--bg-1), var(--bg-2));
        border-bottom: 1px solid var(--border);
      }

      .cabecalho .cabecalho-container { width: 100%; max-width: 1200px; margin: 0 auto; padding: 0 20px; }
      .cabecalho .wrap { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; }
      .logo { height: 34px; width: auto; display: block; }
      nav.menu a { margin-left: 18px; text-decoration: none; font-weight: 600; color: var(--text-primary); transition: color 0.2s ease; }
      nav.menu a:hover { color: var(--brand); }
      .hamburguer { display: none; background: transparent; border: none; color: var(--text-primary); font-size: 1.6rem; cursor: pointer; line-height: 1; }

      #mobileMenu {
        position: fixed;
        top: 56px;
        left: 0;
        right: 0;
        z-index: 10025;
        background: rgba(0, 31, 51, 0.92);
        border-bottom: 1px solid var(--border);
        max-height: 0;
        opacity: 0;
        overflow: hidden;
        pointer-events: none;
        transition: max-height 0.35s ease, opacity 0.35s ease;
      }

      #mobileMenu.open { max-height: 240px; opacity: 1; pointer-events: auto; }

      @media (max-width: 768px) { .hamburguer { display: block; } nav.menu { display: none; } }

      .impressora-barra {
        position: fixed;
        top: 56px;
        left: 0;
        right: 0;
        height: 45px;
        background: linear-gradient(180deg, #1a1a1a 0%, #2d2d2d 50%, #1a1a1a 100%);
        z-index: 1500;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
      }

      .impressora-barra::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 3px;
        background: linear-gradient(90deg, #333 0%, #666 50%, #333 100%);
      }

      .impressora-barra::after {
        content: '';
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        height: 3px;
        background: linear-gradient(90deg, #1a1a1a 0%, #444 50%, #1a1a1a 100%);
      }

      .impressora-leds {
        display: flex;
        gap: 8px;
        position: absolute;
        left: 20px;
      }

      .led { width: 8px; height: 8px; border-radius: 50%; background-color: #333; transition: all 0.3s ease; }
      .led.vermelho { background-color: #ff3333; box-shadow: 0 0 5px #ff3333; }
      .led.verde { background-color: #33ff33; box-shadow: 0 0 5px #33ff33; }
      .led.amarelo { background-color: #ffcc00; box-shadow: 0 0 5px #ffcc00; }

      .led.amarelo.imprimindo { animation: ledAmareloPisca 0.4s infinite; }

      @keyframes ledAmareloPisca {
        0%, 100% { opacity: 1; box-shadow: 0 0 10px #ffcc00; }
        50% { opacity: 0.3; box-shadow: 0 0 3px #ffcc00; }
      }

      .led.verde.concluido { animation: ledVerdePisca 1s infinite; }

      @keyframes ledVerdePisca {
        0%, 100% { opacity: 1; box-shadow: 0 0 10px #33ff33; }
        50% { opacity: 0.5; box-shadow: 0 0 3px #33ff33; }
      }

      .led.vermelho.erro { animation: ledErroPisca 0.25s infinite; }

      @keyframes ledErroPisca {
        0%, 100% { opacity: 1; box-shadow: 0 0 15px #ff0000, 0 0 25px #ff3333; background-color: #ff0000; }
        50% { opacity: 0.7; box-shadow: 0 0 8px #ff0000; }
      }

      .led.esmaecido { opacity: 0.15 !important; box-shadow: none !important; }

      .impressora-nome { color: #888; font-size: 12px; font-family: "Arial", sans-serif; text-transform: uppercase; letter-spacing: 2px; }

      .area-visualizacao {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;
        min-height: 100vh;
        padding: 130px 20px 40px;
        width: 100%;
      }

      #curriculo-viewer {
        position: relative;
        width: 794px;
        height: 1123px;
        max-width: 100%;
        overflow: visible;
        background: #ffffff;
        box-shadow: 0 10px 35px rgba(0, 0, 0, 0.3);
        border-radius: 2px;
        border: 1px solid #e0e0e0;
        transform: translateY(-700px);
        opacity: 0;
      }

      #curriculo-viewer.imprimindo { animation: imprimirPapel 3.5s ease-out forwards; }

      @keyframes imprimirPapel {
        0% { transform: translateY(-700px); opacity: 0; }
        10% { transform: translateY(-580px); opacity: 0.15; }
        25% { transform: translateY(-420px); opacity: 0.35; }
        40% { transform: translateY(-280px); opacity: 0.55; }
        55% { transform: translateY(-150px); opacity: 0.7; }
        70% { transform: translateY(-60px); opacity: 0.82; }
        85% { transform: translateY(15px); opacity: 0.92; }
        100% { transform: translateY(0); opacity: 1; }
      }

      .pagina { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; background-size: 100% 100%; background-position: center; background-repeat: no-repeat; }
      .pagina.active { display: block; }

      .pagina .marca-dagua {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 350px;
        height: 350px;
        background: url("/imagens/marca1.png") no-repeat center center;
        background-size: 350px;
        opacity: 0.15;
        pointer-events: none;
        z-index: 1;
      }

      #navegacao { display: flex; justify-content: center; gap: 20px; margin-top: 25px; opacity: 0; transition: opacity 0.5s ease; }
      #navegacao.mostrar { opacity: 1; }
      #navegacao button { background-color: #00324a; color: white; padding: 8px 16px; font-size: 18px; border: none; border-radius: 10px; cursor: pointer; transition: background 0.3s ease; }
      #navegacao button:hover { background-color: #005066; }

      .botoes-flutuantes {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
        z-index: 1000;
        width: 90%;
        max-width: 400px;
        opacity: 0;
        transition: opacity 0.5s ease;
        margin-top: 25px;
      }

      .botoes-flutuantes.mostrar { opacity: 1; }
      .linha-botoes { display: flex; gap: 12px; width: 100%; justify-content: center; }
      .botoes-flutuantes button { flex: 1; max-width: 160px; background-color: #00324a; color: white; padding: 12px 20px; font-size: 14px; font-weight: 600; border: none; border-radius: 10px; cursor: pointer; transition: background 0.3s ease, transform 0.2s ease; }
      .botoes-flutuantes button:hover { background-color: #005066; transform: translateY(-2px); }
      .botoes-flutuantes .btn-pdf { background-color: #e63946; }
      .botoes-flutuantes .btn-pdf:hover { background-color: #c1121f; }
      .botoes-flutuantes .btn-pdf.bloqueado { background-color: #666; cursor: not-allowed; opacity: 0.6; }
      .botoes-flutuantes .btn-pdf.bloqueado:hover { transform: none; background-color: #666; }
      .obs { font-size: 12px; color: #ccc; background: rgba(0, 0, 0, 0.6); padding: 8px 16px; border-radius: 6px; text-align: center; line-height: 1.4; }
      .mensagem-erro { display: none; background: rgba(255, 0, 0, 0.15); border: 1px solid #ff3333; color: #ff6666; padding: 10px 16px; border-radius: 8px; font-size: 13px; text-align: center; margin-bottom: 10px; }
      .mensagem-erro.mostrar { display: block; }

      @media (min-width: 795px) {
        .botoes-flutuantes { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); }
        .area-botoes-mobile { display: contents; }
      }

      @media (max-width: 794px) {
        .impressora-barra { height: 35px; }
        .impressora-nome { font-size: 10px; }
        .area-visualizacao { padding: 110px 10px 30px; }
        #curriculo-viewer { width: 100%; height: auto; aspect-ratio: 794 / 1123; border-radius: 2px; box-shadow: 0 6px 20px rgba(0, 0, 0, 0.25); }
        .pagina .marca-dagua { width: 60%; height: 60%; background-size: contain; }
        .area-botoes-mobile { display: flex; flex-direction: column; align-items: center; width: 100%; margin-top: 20px; padding-bottom: 20px; }
        .botoes-flutuantes { position: static; transform: none; width: 95%; margin-top: 0; }
        .linha-botoes { flex-direction: column; gap: 8px; }
        .botoes-flutuantes button { max-width: 100%; }
        .obs { font-size: 11px; padding: 6px 10px; }
        #navegacao button { font-size: 16px; padding: 6px 12px; }
      }

      @media (max-width: 400px) {
        .linha-botoes { flex-direction: column; gap: 8px; }
        .botoes-flutuantes button { max-width: 100%; }
      }
    </style>
  </head>
  <body>

    <header class="cabecalho">
      <div class="cabecalho-container">
        <div class="wrap">
          <a href="/" class="logo-link" aria-label="Voltar para o inicio">
            <img src="https://i.imgur.com/HjzGCoA.png" alt="Office Express" class="logo" />
          </a>
          <nav class="menu">
            <a href="/">Inicio</a>
            <a href="/contato">Contato</a>
            <a href="/sobre">Sobre nos</a>
          </nav>
          <button class="hamburguer" id="btnMenu" aria-label="Abrir menu">☰</button>
        </div>
      </div>
    </header>

    <div id="mobileMenu">
      <div style="display: flex; flex-direction: column; gap: 12px; justify-content: center; padding: 14px; background: rgba(0, 31, 51, 0.92); border-bottom: 1px solid var(--border); text-align: center;">
        <a href="/" style="color: #fff; font-weight: 600; text-decoration: none">Inicio</a>
        <a href="/contato" style="color: #fff; font-weight: 600; text-decoration: none">Contato</a>
        <a href="/sobre" style="color: #fff; font-weight: 600; text-decoration: none">Sobre nos</a>
      </div>
    </div>

    <div class="impressora-barra">
      <div class="impressora-leds">
        <div class="led vermelho" id="ledVermelho"></div>
        <div class="led verde" id="ledVerde"></div>
        <div class="led amarelo" id="ledAmarelo"></div>
      </div>
      <div class="impressora-nome">Office Express Printer</div>
    </div>

    <div class="area-visualizacao">
      <div id="curriculo-viewer"></div>
      
      <div class="area-botoes-mobile">
        <div class="mensagem-erro" id="mensagemErro"></div>
        
        <div id="navegacao">
          <button id="voltar" style="display: none">Anterior</button>
          <button id="avancar" style="display: none">Proxima</button>
        </div>

        <div class="botoes-flutuantes">
          <div class="linha-botoes">
            <button onclick="voltarParaCurriculo()">Editar</button>
            <button class="btn-pdf" id="btnGerarPdf" onclick="redirecionarParaLoading()">Gerar PDF</button>
          </div>
          <div class="obs">OBS: a marca d'agua aparece so nesta visualizacao.<br>O documento final sera entregue sem ela.</div>
        </div>
      </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script>
      const btnMenu = document.getElementById('btnMenu');
      const mobileMenu = document.getElementById('mobileMenu');
      btnMenu.addEventListener('click', () => mobileMenu.classList.toggle('open'));

      const dados = JSON.parse(localStorage.getItem("curriculo")) || {};

      function verificarErros() {
        const erros = [];
        if (!dados.nome || dados.nome.trim() === '') erros.push("Nome completo");
        if (!dados.telefone || (Array.isArray(dados.telefone) && dados.telefone.length === 0) || (typeof dados.telefone === 'string' && dados.telefone.trim() === '')) erros.push("Telefone");
        if (!dados.formacao || dados.formacao.trim() === '') erros.push("Escolaridade");
        if (!dados.objetivo || dados.objetivo.trim() === '') erros.push("Objetivo");
        return erros;
      }

      const errosEncontrados = verificarErros();
      const temErros = errosEncontrados.length > 0;

      const curriculo = document.createElement("div");
      curriculo.id = "curriculo";
      curriculo.innerHTML = `
        <div class="info-topo">
          <div>
            <h1>${dados.nome || ""}</h1>
            ${dados.email ? `<p><strong>Email:</strong> ${dados.email}</p>` : ""}
            ${dados.telefone ? `<p><strong>Telefone:</strong> ${Array.isArray(dados.telefone) ? dados.telefone.join(" ") : dados.telefone}</p>` : ""}
            ${dados.idade ? `<p><strong>Idade:</strong> ${dados.idade} anos</p>` : ""}
            ${dados.endereco || dados.numero || dados.complemento || dados.bairro || dados.cidade || dados.estado || dados.cep ? `<p><strong>Endereco:</strong> ${dados.endereco || ""}${dados.numero ? `, ${dados.numero}` : ""}${dados.complemento ? ` (${dados.complemento})` : ""}${dados.bairro ? ` - ${dados.bairro}` : ""}${dados.cidade ? `, ${dados.cidade}` : ""}${dados.estado ? ` - ${dados.estado}` : ""}${dados.cep ? ` | CEP: ${dados.cep}` : ""}</p>` : ""}
            ${dados.infoAdicional ? `<p style="margin-top:6px;">${dados.infoAdicional}</p>` : ""}
          </div>
          ${dados.foto ? `<img src="${dados.foto}" class="foto" />` : ""}
        </div>
        ${dados.objetivo ? `<h2>Objetivo</h2><p>${dados.objetivo}</p>` : ""}
        ${dados.formacao ? `<h2>Formacao Academica</h2><p>${dados.formacao}</p>` : ""}
      `;

      if (Array.isArray(dados.curso)) {
        let html = "";
        for (let i = 0; i < dados.curso.length; i++) {
          const nome = dados.curso[i]?.trim();
          const inst = dados.instituicao[i]?.trim();
          let carga = dados.carga[i]?.trim();
          if (carga && /^\d+$/.test(carga)) carga += "hs";
          if (nome || inst || carga) {
            html += "<li>";
            if (nome) html += `<strong>${nome}</strong>`;
            if (inst) html += ` - ${inst}`;
            if (carga) html += ` <em>(${carga})</em>`;
            html += "</li>";
          }
        }
        if (html) curriculo.innerHTML += `<h2>Cursos</h2><ul>${html}</ul>`;
      }

      if (Array.isArray(dados.empresa)) {
        let html = "";
        for (let i = 0; i < dados.empresa.length; i++) {
          const empresa = dados.empresa[i]?.trim();
          const cargo = dados.cargo?.[i]?.trim();
          const inicio = dados.periodo_inicio?.[i]?.trim();
          const fim = dados.periodo_fim?.[i]?.trim();
          const atividades = dados.atividades?.[i]?.trim();
          const periodo = inicio && fim ? `${inicio} a ${fim}` : inicio || fim || "";
          if (empresa || cargo || periodo || atividades) {
            html += "<li>";
            if (empresa) html += `<strong>${empresa}</strong>${periodo ? ` - <em>${periodo}</em>` : ""}`;
            else if (periodo) html += `<em>${periodo}</em>`;
            if (cargo) html += `<br>${cargo}`;
            if (atividades) html += `<br><span>${atividades}</span>`;
            html += "</li>";
          }
        }
        if (html) curriculo.innerHTML += `<h2>Experiencia Profissional</h2><ul>${html}</ul>`;
      }

      if (dados.habilidades) curriculo.innerHTML += `<h2>Habilidades</h2><p>${dados.habilidades}</p>`;
      if (dados.hobbies) curriculo.innerHTML += `<h2>Hobbies</h2><p>${dados.hobbies}</p>`;

      const clone = curriculo.cloneNode(true);
      clone.style.position = "absolute";
      clone.style.top = "-9999px";
      clone.style.left = "-9999px";
      clone.style.width = "794px";
      clone.style.padding = "60px";
      clone.style.background = "white";
      clone.style.boxSizing = "border-box";
      clone.style.fontFamily = '"Segoe UI", Arial, sans-serif';
      clone.style.fontSize = "14px";
      clone.style.lineHeight = "1.6";
      clone.style.color = "#333";

      const style = document.createElement('style');
      style.textContent = `
        #curriculo h1 { font-size: 32px; margin-bottom: 10px; color: #00324a; }
        #curriculo h2 { font-size: 20px; margin-top: 30px; color: #00324a; border-bottom: 1px solid #ccc; padding-bottom: 4px; }
        #curriculo p, #curriculo li { font-size: 16px; margin: 2px 0; line-height: 1.2; }
        #curriculo ul { padding-left: 20px; margin-top: 10px; }
        #curriculo li { margin-bottom: 8px; }
        #curriculo .info-topo { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 15px; }
        #curriculo .foto { width: 120px; height: 160px; border-radius: 5px; object-fit: cover; border: 1px solid #ccc; margin-left: 30px; }
      `;
      clone.appendChild(style);
      document.body.appendChild(clone);

      (async () => {
        const canvas = await html2canvas(clone, { scale: 1 });
        document.body.removeChild(clone);
        const pageHeightPx = 1123;
        const totalPages = Math.ceil(canvas.height / pageHeightPx);

        const viewer = document.getElementById("curriculo-viewer");

        for (let i = 0; i < totalPages; i++) {
          const pageCanvas = document.createElement("canvas");
          pageCanvas.width = 794;
          pageCanvas.height = 1123;
          const ctx = pageCanvas.getContext("2d");
          ctx.fillStyle = "white";
          ctx.fillRect(0, 0, pageCanvas.width, pageCanvas.height);
          ctx.drawImage(canvas, 0, -i * pageHeightPx);

          const pagina = document.createElement("div");
          pagina.className = "pagina";
          pagina.style.backgroundImage = `url('${pageCanvas.toDataURL("image/png")}')`;
          pagina.style.backgroundSize = "100% 100%";
          pagina.style.backgroundPosition = "center";
          pagina.style.backgroundRepeat = "no-repeat";

          const marca = document.createElement("div");
          marca.className = "marca-dagua";
          pagina.appendChild(marca);

          viewer.appendChild(pagina);
        }

        const ledAmarelo = document.getElementById('ledAmarelo');
        
        setTimeout(() => {
          ledAmarelo.classList.add('imprimindo');
          document.getElementById("curriculo-viewer").classList.add("imprimindo");
          
          setTimeout(() => {
            ledAmarelo.classList.remove('imprimindo');
            ledAmarelo.classList.add('esmaecido');
            
            const ledVerde = document.getElementById('ledVerde');
            ledVerde.classList.add('concluido');
            
            if (temErros) {
              ledVerde.classList.remove('concluido');
              ledVerde.classList.add('esmaecido');
              
              const ledVermelho = document.getElementById('ledVermelho');
              ledVermelho.classList.add('erro');
              
              const msgErro = document.getElementById('mensagemErro');
              msgErro.textContent = "Preencha os campos obrigatorios: " + errosEncontrados.join(", ");
              msgErro.classList.add('mostrar');
              
              const btnPdf = document.getElementById('btnGerarPdf');
              btnPdf.classList.add('bloqueado');
              btnPdf.onclick = function() { alert("Preencha os campos obrigatorios primeiro!"); };
            }
            
            document.getElementById("navegacao").classList.add("mostrar");
            document.querySelector(".botoes-flutuantes").classList.add("mostrar");
          }, 3500);
        }, 500);

        atualizarVisualizacao();
      })();

      let paginaAtual = 0;

      function atualizarVisualizacao() {
        const paginas = document.querySelectorAll(".pagina");
        paginas.forEach((pagina, index) => {
          pagina.classList.toggle("active", index === paginaAtual);
        });

        const btnVoltar = document.getElementById("voltar");
        const btnAvancar = document.getElementById("avancar");

        btnVoltar.style.display = paginaAtual > 0 ? "inline-block" : "none";
        btnAvancar.style.display = paginaAtual < paginas.length - 1 ? "inline-block" : "none";

        if (paginas.length <= 1) {
          document.getElementById("navegacao").style.display = "none";
        } else {
          document.getElementById("navegacao").style.display = "flex";
        }
      }

      document.getElementById("voltar").addEventListener("click", () => {
        if (paginaAtual > 0) { paginaAtual--; atualizarVisualizacao(); }
      });

      document.getElementById("avancar").addEventListener("click", () => {
        const paginas = document.querySelectorAll(".pagina");
        if (paginaAtual < paginas.length - 1) { paginaAtual++; atualizarVisualizacao(); }
      });

      function voltarParaCurriculo() { window.location.href = "/curriculo"; }

      async function redirecionarParaLoading() {
        if (temErros) { alert("Preencha os campos obrigatorios primeiro!"); return; }
        
        const telefone = Array.isArray(dados.telefone) ? dados.telefone.join(" ") : dados.telefone || "";
        try {
          await fetch("SEU_ENDPOINT_AQUI", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ telefone }) });
          localStorage.setItem("curriculoParaEnviar", "true");
          localStorage.setItem("entradaViaSplash", "true");
          localStorage.setItem("navegandoInternamente", "true");
          window.removeEventListener("unload", enviarLogAbandono);
          document.removeEventListener("visibilitychange", handleVisibilityChange);
          window.location.href = "/loading";
        } catch (error) {
          console.error("Erro ao enviar telefone:", error);
          alert("Falha ao conectar com o servidor.");
        }
      }

      const inicio = Date.now();
      const nome = JSON.parse(localStorage.getItem("curriculo"))?.nome || "visitante";
      let logEnviado = false;
      let entradaViaSplash = localStorage.getItem("entradaViaSplash") === "true";
      let navegandoInternamente = localStorage.getItem("navegandoInternamente") === "true";

      document.addEventListener("click", (e) => {
        const el = e.target.closest("a");
        if (el && el.href && el.href.includes(window.location.origin)) { navegandoInternamente = true; }
      });

      setTimeout(() => { window.rastreioLiberado = true; }, 300);

      window.enviarLogAbandono = function () {
        if (logEnviado || !entradaViaSplash || navegandoInternamente) return;
        logEnviado = true;
        const tempo = Math.round((Date.now() - inicio) / 1000);
        const payload = JSON.stringify({ acao: "etapa", nome, etapa: `Abandonou Visualizou apos ${tempo}s`, timestamp: new Date().toISOString() });
        try {
          const blob = new Blob([payload], { type: "application/json" });
          navigator.sendBeacon("https://www.officeexpress.com.br/api/logs", blob);
        } catch (err) {
          fetch("https://www.officeexpress.com.br/api/logs", { method: "POST", headers: { "Content-Type": "application/json" }, body: payload, keepalive: true });
        }
      };

      window.handleVisibilityChange = function () {
        if (document.visibilityState === "hidden" && window.rastreioLiberado) { enviarLogAbandono(); }
      };

      window.addEventListener("unload", enviarLogAbandono);
      document.addEventListener("visibilitychange", handleVisibilityChange);
    </script>
  </body>
</html>
